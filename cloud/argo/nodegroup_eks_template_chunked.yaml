apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: sandpiper
  region: us-east-1

managedNodeGroups:
  - name: io-mach9
    instanceType: c7a.12xlarge
    minSize: 0
    maxSize: 2
    desiredCapacity: 2
    volumeSize: 600
    volumeType: gp3
    volumeIOPS: 6000
    volumeThroughput: 1000
    spot: true
